<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title>Mercado Vivo</ion-title>

    <ion-buttons slot="end">
      <ion-button (click)="consultarAPI()">
        <ion-icon slot="icon-only" name="refresh-circle-outline"></ion-icon>
      </ion-button>

      <ion-button (click)="toggleTheme()" style="font-size: 1.2rem">
        <ion-icon
          [name]="darkMode ? 'sunny-outline' : 'moon-outline'"
        ></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-grid>
    <ion-row>
      <ion-col size="6" *ngFor="let crypto of listaActivos">
        <ion-card class="crypto-mosaic-card">
          <div class="card-glass-blur"></div>

          <div class="card-header-mosaic">
            <ion-avatar>
              <img [src]="crypto.image" [alt]="crypto.name" />
            </ion-avatar>
            <ion-badge
              [color]="crypto.price_change_percentage_24h >= 0 ? 'success' : 'danger'"
              mode="ios"
            >
              {{ crypto.price_change_percentage_24h | number:'1.1-1' }}%
            </ion-badge>
          </div>

          <div class="card-body-mosaic">
            <h3>{{ crypto.name }}</h3>
            <p class="symbol">{{ crypto.symbol | uppercase }}</p>
            <p class="price">${{ crypto.current_price | number:'1.2-2' }}</p>
          </div>

          <div class="card-actions-mosaic">
            <ion-button
              fill="clear"
              size="small"
              (click)="alternarFavorito(crypto.id)"
            >
              <ion-icon
                slot="icon-only"
                [name]="crypto.isFavorite ? 'star' : 'star-outline'"
                [color]="crypto.isFavorite ? 'warning' : 'medium'"
              >
              </ion-icon>
            </ion-button>
          </div>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
  <div style="height: 50px; width: 100%"></div>
</ion-content>
