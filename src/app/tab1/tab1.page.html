<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Mi proceso - movil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-pading">
  <ion-list>
    <ion-item *ngFor="let t of tareas; let i = index"> 
    <ion-label>{{ t.nombre }}</ion-label>
    <ion-checkbox [checked]="t.completada" (click)="cambiarEstado(i)" slot="end"></ion-checkbox> 
    </ion-item>
  </ion-list>
</ion-content>
